name: Build Mac Application

on:
  workflow_dispatch: 

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies & PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build the App with PyInstaller
      run: |
        pyinstaller --windowed --noconfirm --name "JR AI Photo Tagger" app.py

    - name: Build Standard macOS DMG File
      run: |
        mkdir -p dist/dmg_source
        cp -R "dist/JR AI Photo Tagger.app" dist/dmg_source/
        hdiutil create -volname "JR AI Photo Tagger Installer" -srcfolder dist/dmg_source -ov -format UDZO dist/JR_AI_Photo_Tagger.dmg

    - name: Upload Finished DMG File
      uses: actions/upload-artifact@v4
      with:
        name: Mac-DMG-Installer
        path: dist/JR_AI_Photo_Tagger.dmg
