name: Build Cross-Platform Applications

on:
  workflow_dispatch: 

jobs:
  build-apps:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: Mac-DMG-Installer
            build_script: |
              pyinstaller --windowed --noconfirm --name "JR AI Photo Tagger" app.py
              mkdir -p dist/dmg_source
              cp -R "dist/JR AI Photo Tagger.app" dist/dmg_source/
              hdiutil create -volname "JR AI Photo Tagger Installer" -srcfolder dist/dmg_source -ov -format UDZO dist/JR_AI_Photo_Tagger.dmg
            file_path: dist/JR_AI_Photo_Tagger.dmg

          - os: windows-latest
            artifact_name: Windows-Executable
            build_script: |
              pip install pydantic==2.8.2
              pyinstaller --onefile --windowed --noconfirm --name "JR_AI_Photo_Tagger" app.py
            file_path: dist/JR_AI_Photo_Tagger.exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies & PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Run Build Script
      run: ${{ matrix.build_script }}

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.file_path }}
