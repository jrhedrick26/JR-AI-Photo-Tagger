name: Build Mac Application

# This tells GitHub to give us a "Run Workflow" button to trigger this manually
on:
  workflow_dispatch: 

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies & PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build the App with PyInstaller
      run: |
        pyinstaller --windowed --noconfirm --name "JR AI Photo Tagger" app.py

    - name: Zip the Application Bundle
      run: |
        cd dist
        zip -r "JR.AI.Photo.Tagger.zip" "JR AI Photo Tagger.app"

    - name: Upload the Finished ZIP File
      uses: actions/upload-artifact@v4
      with:
        name: Mac-App-Bundle
        path: dist/JR.AI.Photo.Tagger.zip
